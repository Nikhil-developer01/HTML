<!doctype html>
<html>
  <head>
    <title>Registration form</title>
  </head>
  <body>
    <table border="1" cellpadding="10" width="30%" align="center">
      <border>
        <h2 align="center">Job Application Form</h2>
        <form>
          <tr>
            <td width="30%"><b>Full Name:</b></td>
            <td width="70%">
              <input type="text" placeholder="Enter Your Name" />
            </td>
          </tr>

          <tr>
            <td width="30%"><b>Email Address:</b></td>
            <td width="70%"><input type="email" /></td>
          </tr>

          <tr>
            <td width="30%"><b>Phone Number:</b></td>
            <td width="70%"><input type="tel" placeholder="123-456-7890" /></td>
          </tr>

          <tr>
            <td width="30%"><b>Gender:</b></td>
            <td width="70%">
              <input type="radio" name="gender" /> <b>Male</b>
              <input type="radio" name="gender" /> <b>Female</b>
            </td>
          </tr>

          <tr>
            <td width="30%"><b>Job Role:</b></td>
            <td width="70%">
              <select>
                <option>--Select Role--</option>
                <option>Accountant</option>
                <option>Software Developer</option>
                <option>Clerk</option>
                <option>Frontend Developer</option>
              </select>
            </td>
          </tr>

          <tr>
            <td width="30%"><b>Date Of Birth:</b></td>
            <td width="70%"><input type="date" /></td>
          </tr>

          <tr>
            <td width="30%"><b>Favorite Color:</b></td>
            <td width="70%"><input type="color" /></td>
          </tr>

          <tr>
            <td width="30%"><b>Upload Resume:</b></td>
            <td width="70%"><input type="file" /></td>
          </tr>

          <tr>
            <td width="30%"><b>Skills:</b></td>
            <td width="70%">
              <input type="checkbox" /> HTML <input type="checkbox" /> CSS
              <input type="checkbox" /> JS <input type="checkbox" /> REACT
            </td>
          </tr>

          <tr>
            <td width="30%"><b>Cover Letter:</b></td>
            <td width="70%">
              <textarea
                placeholder="Write something about yourself..."
                rows="4"
                cols="30"
              ></textarea>
            </td>
          </tr>

          <tr>
            <td colspan="2" align="center">
              <button type="submit">Submit</button>
              <button type="reset">Reset</button>
            </td>
          </tr>
        </form>
      </border>
    </table>
  </body>
</html>
